# Generated by github.com/arran4/go-subcommand/cmd/gosubc
# .goreleaser.yml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sentencestats
    main: ./cmd/sentencestats
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 6
      - 7

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - id: sentencestats
    package_name: sentencestats
    vendor: arran4
    homepage: https://github.com/arran4/
    maintainer: arran4 <arran4@users.noreply.github.com>
    description: Sentence Stats is a Go tool for visualizing character and character pair frequencies in sentences.
    license: BSD-3-Clause
    formats:
      - deb
      - rpm
      - apk
      - termux.deb
      - archlinux

homebrew_casks:
  -
    repository:
      owner: arran4
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
