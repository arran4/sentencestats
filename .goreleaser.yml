# Generated by github.com/arran4/go-subcommand/cmd/gosubc
# .goreleaser.yml

before:
  hooks:
    - go mod tidy

builds:
  - id: sentencestats
    main: ./cmd/sentencestats
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 6
      - 7

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

nfpms:
  - id: sentencestats
    package_name: sentencestats
    vendor: arran4
    homepage: https://github.com/arran4/
    maintainer: arran4 <arran4@users.noreply.github.com>
    description: Sentence Stats is a Go tool for visualizing character and character pair frequencies in sentences.
    license: BSD-3-Clause
    formats:
      - deb
      - rpm
      - apk
      - termux.deb
      - archlinux
